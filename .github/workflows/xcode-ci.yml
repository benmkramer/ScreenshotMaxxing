name: Xcode CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Xcode CI
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout v4

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          xcrun swift-format --version

      - name: Run lint
        run: scripts/lint.sh

      - name: Run unit tests
        timeout-minutes: 5
        run: scripts/test.sh unit
        env:
          DERIVED_DATA_PATH: ${{ runner.temp }}/ScreenshotMaxxingUnitDerivedData

      - name: Run UI tests
        timeout-minutes: 5
        run: scripts/test.sh ui
        env:
          DERIVED_DATA_PATH: ${{ runner.temp }}/ScreenshotMaxxingUIDerivedData
