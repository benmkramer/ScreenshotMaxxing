name: CodeQL

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "23 10 * * 1"

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            runner: ubuntu-latest
          - language: swift
            runner: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout v4

      - name: Select Xcode 26.2
        if: matrix.language == 'swift'
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # github/codeql-action v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Build for analysis
        if: matrix.language == 'swift'
        run: |
          xcodebuild build \
            -project ScreenshotMaxxing.xcodeproj \
            -target ScreenshotMaxxing \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/ScreenshotMaxxingCodeQLDerivedData" \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # github/codeql-action v4
        with:
          category: "/language:${{ matrix.language }}"
